<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Viewer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>MD Viewer</h1>
        <input type="text" id="search" placeholder="搜索文件...">
        <button id="theme-toggle" title="切换主题">🌙</button>
      </div>
      <nav id="file-tree"></nav>
    </aside>
    <main id="content">
      <div id="welcome">
        <h2>选择左侧文件开始阅读</h2>
        <p>或在手机上直接点击文件名</p>
      </div>
      <article id="reader" class="hidden">
        <div id="reader-header">
          <button id="back-btn" class="mobile-only">← 返回</button>
          <h2 id="reader-title"></h2>
        </div>
        <div id="toc" class="hidden"></div>
        <div id="markdown-body"></div>
      </article>
    </main>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
